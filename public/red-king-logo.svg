<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glow" cx="64" cy="50" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(248,81,73,0.25)" />
      <stop offset="100%" stop-color="rgba(248,81,73,0)" />
    </radialGradient>
    <linearGradient id="crownGrad" x1="24" y1="80" x2="104" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d29922" />
      <stop offset="40%" stop-color="#f0883e" />
      <stop offset="100%" stop-color="#f85149" />
    </linearGradient>
    <linearGradient id="rkGrad" x1="40" y1="100" x2="88" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f85149" />
      <stop offset="100%" stop-color="#d29922" />
    </linearGradient>
  </defs>

  <!-- Glow circle behind -->
  <circle cx="64" cy="56" r="48" fill="url(#glow)" />

  <!-- Crown base (King = 王) -->
  <!-- Crown base bar -->
  <rect x="28" y="72" width="72" height="12" rx="3" fill="url(#crownGrad)" opacity="0.9" />
  <!-- Crown points -->
  <polygon points="28,72 36,38 44,72" fill="url(#crownGrad)" />
  <polygon points="40,72 52,22 56,72" fill="url(#crownGrad)" />
  <polygon points="52,72 64,14 68,72" fill="url(#crownGrad)" />
  <polygon points="64,72 76,22 80,72" fill="url(#crownGrad)" />
  <polygon points="76,72 84,38 92,72" fill="url(#crownGrad)" />

  <!-- Crown points highlight -->
  <polygon points="52,72 64,14 68,72" fill="url(#rkGrad)" opacity="0.35" />

  <!-- Diamond on center peak -->
  <circle cx="64" cy="28" r="5" fill="#d29922" opacity="0.9" />

  <!-- Red King eyes (subtle, within crown base) -->
  <ellipse cx="50" cy="62" rx="6" ry="5" fill="#f85149" opacity="0.8" />
  <ellipse cx="78" cy="62" rx="6" ry="5" fill="#f85149" opacity="0.8" />
  <circle cx="50" cy="61" r="2.5" fill="#fff" opacity="0.6" />
  <circle cx="78" cy="61" r="2.5" fill="#fff" opacity="0.6" />

  <!-- Mouth / fangs (Red King kaiju element) -->
  <polygon points="56,68 64,62 72,68" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" />

  <!-- Small horns on sides (Red King kaiju element) -->
  <polygon points="28,78 18,68 30,74" fill="#f85149" opacity="0.7" />
  <polygon points="100,78 110,68 98,74" fill="#f85149" opacity="0.7" />

  <!-- RK text in the crown base -->
  <text x="64" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="900" fill="#0d1117" opacity="0.7" letter-spacing="1">RK</text>
</svg>
